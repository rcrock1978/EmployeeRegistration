name: optodev-members

services:
  postgres:
    image: postgres:16-alpine
    container_name: optodev-members-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: optodev_members
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: optodev-members-api
    build:
      context: .
      dockerfile: src/Members.WebApi/Dockerfile
    container_name: optodev-members-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=optodev_members;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: optodev-members-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
